<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 450px;
        max-width: 450px;
        overflow-x: hidden;
        font-family: Arial, sans-serif;
        background: #e9e4d0;
        color: #1a1a1a;
      }

      .header {
        background: #1a1a1a;
        color: white;
        padding: 16px 20px;
        border-bottom: 6px solid #332211;
        display: flex;
        align-items: baseline;
        gap: 6px;
      }
      .header h2 {
        font-size: 20px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .header .dot {
        color: #ec5b13;
        font-size: 20px;
        font-weight: bold;
      }
      .header .sub {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #ffffff80;
        margin-left: 4px;
      }

      .content {
        padding: 20px;
      }

      .field {
        margin-bottom: 14px;
      }
      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }

      label {
        display: block;
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 10px;
        border: 4px solid #1a1a1a;
        background: white;
        font-size: 13px;
        font-family: Arial, sans-serif;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #ec5b13;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .button-group {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        padding: 14px;
        border: 4px solid #1a1a1a;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        box-shadow: 4px 4px 0px 0px #332211;
        transition: all 0.1s;
      }
      button:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px 0px #332211;
      }
      button:active {
        transform: translate(4px, 4px);
        box-shadow: none;
      }
      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-primary {
        background: #ec5b13;
        color: white;
      }
      .btn-primary:hover {
        background: #d94f0f;
      }
      .btn-secondary {
        background: white;
        color: #1a1a1a;
      }
      .btn-secondary:hover {
        background: #e9e9e9;
      }

      .status {
        height: 52px;
        margin-top: 14px;
        padding: 14px;
        font-size: 13px;
        font-weight: bold;
        text-align: center;
        border: 4px solid transparent;
        background: transparent;
        visibility: hidden;
      }
      .status.success {
        background: #a3b18a;
        color: #1a1a1a;
        border-color: #1a1a1a;
        visibility: visible;
      }
      .status.error {
        background: #c57b7d;
        color: white;
        border-color: #1a1a1a;
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>BILLET<span class="dot">.</span></h2>
      <span class="sub">Quick Add</span>
    </div>

    <div class="content">
      <div class="field">
        <label>Position</label>
        <input type="text" id="position" required />
      </div>

      <div class="field-row">
        <div>
          <label>Company</label>
          <input type="text" id="company" required />
        </div>
        <div>
          <label>Location</label>
          <input type="text" id="location" />
        </div>
      </div>

      <div class="field-row">
        <div>
          <label>Salary</label>
          <input type="text" id="salary" placeholder="$100k - $150k" />
        </div>
        <div>
          <label>Status</label>
          <select id="status">
            <option value="PENDING">To Apply</option>
            <option value="APPLIED">Applied</option>
            <option value="SCREENING">Screening</option>
            <option value="INTERVIEW">Interview</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Contact Email</label>
        <input type="email" id="contactEmail" />
      </div>

      <div class="field">
        <label>Job URL</label>
        <input type="text" id="url" />
      </div>

      <div class="field">
        <label>Description</label>
        <textarea id="description" rows="3"></textarea>
      </div>

      <div class="button-group">
        <button id="saveBtn" class="btn-primary">Save to Billet</button>
        <button id="autofillBtn" class="btn-secondary">Autofill</button>
      </div>

      <div id="statusMsg" class="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
